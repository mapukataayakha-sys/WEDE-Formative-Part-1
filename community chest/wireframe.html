<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Chest - Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }
        
        .wireframe-container {
            max-width: 1440px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .wireframe-header {
            background: #1a365d;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-placeholder {
            width: 220px;
            height: 40px;
            background: #2a4a7a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            padding-left: 16px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .nav-placeholder {
            display: flex;
            gap: 24px;
        }
        
        .nav-item {
            width: 80px;
            height: 20px;
            background: #2a4a7a;
            border-radius: 4px;
        }
        
        .section {
            padding: 60px 40px;
            border-bottom: 1px dashed #ccc;
        }
        
        .section-label {
            background: #e0e0e0;
            color: #333;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
            margin-bottom: 24px;
            display: inline-block;
        }
        
        .hero-wireframe {
            background: linear-gradient(135deg, #1a365d 0%, #2a4a7a 100%);
            padding: 120px 40px;
            text-align: center;
        }
        
        .hero-title {
            width: 500px;
            height: 60px;
            background: #3a5a8a;
            border-radius: 8px;
            margin: 0 auto 24px;
        }
        
        .hero-subtitle {
            width: 280px;
            height: 24px;
            background: #4a6a9a;
            border-radius: 4px;
            margin: 0 auto 24px;
        }
        
        .hero-desc {
            width: 700px;
            height: 16px;
            background: #4a6a9a;
            border-radius: 4px;
            margin: 0 auto 32px;
        }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        
        .btn-placeholder {
            width: 160px;
            height: 48px;
            border-radius: 8px;
        }
        
        .btn-primary {
            background: #d4a574;
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            background: #f8f9fa;
            padding: 48px 40px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            width: 80px;
            height: 48px;
            background: #1a365d;
            border-radius: 8px;
            margin: 0 auto 12px;
        }
        
        .stat-label {
            width: 140px;
            height: 14px;
            background: #ddd;
            border-radius: 4px;
            margin: 0 auto;
        }
        
        .about-wireframe {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }
        
        .image-placeholder {
            width: 100%;
            height: 400px;
            background: #e8e8e8;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #bbb;
        }
        
        .about-content h2 {
            width: 150px;
            height: 32px;
            background: #1a365d;
            border-radius: 4px;
            margin-bottom: 24px;
        }
        
        .about-content p {
            width: 100%;
            height: 14px;
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        
        .mission-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            background: #f8f9fa;
            padding: 48px;
        }
        
        .mission-item {
            text-align: center;
        }
        
        .mission-item h3 {
            width: 140px;
            height: 24px;
            background: #1a365d;
            border-radius: 4px;
            margin: 0 auto 16px;
        }
        
        .mission-item p {
            width: 100%;
            height: 14px;
            background: #ddd;
            border-radius: 4px;
        }
        
        .program-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        
        .program-card {
            background: #f8f8f8;
            padding: 32px;
            border-radius: 8px;
            text-align: center;
        }
        
        .program-card h3 {
            width: 160px;
            height: 24px;
            background: #1a365d;
            border-radius: 4px;
            margin: 0 auto 16px;
        }
        
        .program-card p {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        
        .program-link {
            width: 100px;
            height: 14px;
            background: #d4a574;
            border-radius: 4px;
            display: inline-block;
        }
        
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        
        .story-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .story-image {
            width: 100%;
            height: 200px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #bbb;
        }
        
        .story-content {
            padding: 24px;
        }
        
        .story-content h3 {
            width: 180px;
            height: 20px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        
        .story-content p {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        
        .sector-tags {
            display: flex;
            gap: 8px;
        }
        
        .sector-tag {
            width: 60px;
            height: 20px;
            background: #1a365d;
            border-radius: 4px;
        }
        
        .involved-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            background: #f8f9fa;
            padding: 48px 40px;
        }
        
        .involved-card {
            background: white;
            padding: 32px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .involved-card h3 {
            width: 140px;
            height: 20px;
            background: #1a365d;
            border-radius: 4px;
            margin: 0 auto 16px;
        }
        
        .involved-card p {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .involved-card .btn-placeholder {
            width: 120px;
            height: 40px;
            margin: 0 auto;
        }
        
        .contact-wireframe {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }
        
        .contact-info h3 {
            width: 180px;
            height: 24px;
            background: #1a365d;
            border-radius: 4px;
            margin-bottom: 24px;
        }
        
        .contact-detail {
            margin-bottom: 24px;
        }
        
        .contact-detail strong {
            display: block;
            width: 80px;
            height: 14px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        
        .contact-detail p {
            width: 200px;
            height: 12px;
            background: #ddd;
            border-radius: 4px;
        }
        
        .form-wireframe {
            background: #f8f8f8;
            padding: 32px;
            border-radius: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            width: 140px;
            height: 14px;
            background: #ccc;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            height: 44px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        select.form-input {
            background: white;
        }
        
        textarea.form-input {
            height: 120px;
        }
        
        .submit-btn {
            width: 100%;
            height: 48px;
            background: #d4a574;
            border-radius: 8px;
            border: none;
        }
        
        .footer-wireframe {
            background: #1a365d;
            padding: 60px 40px;
        }
        
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
        }
        
        .footer-section h4 {
            width: 160px;
            height: 16px;
            background: #3a5a8a;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        
        .footer-section p {
            width: 100%;
            height: 12px;
            background: #2a4a7a;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        
        .footer-section a {
            display: block;
            width: 100px;
            height: 12px;
            background: #2a4a7a;
            border-radius: 4px;
            margin-bottom: 8px;
            text-decoration: none;
        }
        
        .footer-bottom {
            border-top: 1px solid #2a4a7a;
            margin-top: 40px;
            padding-top: 20px;
            text-align: center;
        }
        
        .footer-bottom p {
            width: 280px;
            height: 12px;
            background: #2a4a7a;
            border-radius: 4px;
            margin: 0 auto;
        }
        
        .wireframe-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff5722;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(255,87,34,0.3);
        }
        
        @media (max-width: 1024px) {
            .stats-grid, .mission-grid, .program-grid, .stories-grid, .involved-grid, .footer-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .about-wireframe, .contact-wireframe {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            
            .section {
                padding: 40px 20px;
            }
            
            .stats-grid, .mission-grid, .program-grid, .stories-grid, .involved-grid, .footer-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-placeholder {
                display: none;
            }
            
            .hero-title, .hero-desc {
                width: 100%;
            }
        }
    </style>
</head>
